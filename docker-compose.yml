services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stratum
      POSTGRES_PASSWORD: stratum_dev
      POSTGRES_DB: stratum
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stratum"]
      interval: 5s
      timeout: 5s
      retries: 5

  test-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: stratum_test
      POSTGRES_PASSWORD: stratum_test
      POSTGRES_DB: stratum_test
    ports:
      - "5433:5432"
    volumes:
      - stratum_test_data:/var/lib/postgresql/data
      - ./docker/init-extensions.sql:/docker-entrypoint-initdb.d/init-extensions.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stratum_test"]
      interval: 5s
      timeout: 5s
      retries: 5
    profiles:
      - test

  control-plane:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgres://stratum_app:stratum_dev@db:5432/stratum
      PORT: "3001"
      NODE_ENV: development
      JWT_SECRET: ${JWT_SECRET:-stratum-demo-secret-do-not-use-in-production}
      RATE_LIMIT_MAX: "10000"
      RATE_LIMIT_WINDOW: "1 minute"
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  demo-api:
    build:
      context: .
      dockerfile: packages/demo/api/Dockerfile
    environment:
      DATABASE_URL: postgres://stratum_app:stratum_dev@db:5432/stratum
      STRATUM_URL: http://control-plane:3001
      DEMO_API_PORT: "3002"
    ports:
      - "3002:3002"
    depends_on:
      - control-plane
    profiles:
      - demo

  demo-seed:
    build:
      context: .
      dockerfile: packages/demo/api/Dockerfile.seed
    environment:
      DATABASE_URL: postgres://stratum_app:stratum_dev@db:5432/stratum
      CONTROL_PLANE_URL: http://control-plane:3001/api/v1
      API_KEY: sk_live_demo_key
    depends_on:
      - control-plane
    profiles:
      - demo
    restart: "no"

  demo-web:
    build:
      context: .
      dockerfile: packages/demo/web/Dockerfile
    ports:
      - "3300:3300"
    depends_on:
      - control-plane
      - demo-api
    profiles:
      - demo

volumes:
  pgdata:
  stratum_test_data:
