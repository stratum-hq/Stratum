# Publish packages to npm on version tag push
#
# NPM_TOKEN secret must be configured in GitHub repository settings.
# IMPORTANT: npm tokens expire after 90 days — set a calendar reminder to rotate.

name: Publish to npm

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - run: npm ci
      - run: npm run build

  test:
    name: Test
    needs: build
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: stratum
          POSTGRES_PASSWORD: stratum
          POSTGRES_DB: stratum_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://stratum:stratum@localhost:5432/stratum_test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - run: npm ci
      - run: npm run build
      - run: npm test

  publish:
    name: Publish
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"
          cache: "npm"

      - run: npm ci
      - run: npm run build
      - name: Publish packages (skip already-published versions)
        run: |
          failed=0
          for pkg in packages/*/; do
            if [ -f "$pkg/package.json" ]; then
              name=$(node -p "require('./$pkg/package.json').name")
              version=$(node -p "require('./$pkg/package.json').version")
              is_private=$(node -p "require('./$pkg/package.json').private || false")
              if [ "$is_private" = "true" ]; then
                echo "⏭️  $name (private, skipping)"
                continue
              fi
              output=$(cd "$pkg" && npm publish --access public 2>&1) && {
                echo "✅ $name@$version published"
              } || {
                if echo "$output" | grep -q "You cannot publish over the previously published"; then
                  echo "⏭️  $name@$version already published, skipping"
                else
                  echo "❌ $name@$version failed to publish"
                  echo "$output"
                  failed=1
                fi
              }
            fi
          done
          exit $failed
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
