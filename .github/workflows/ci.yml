name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: stratum
          POSTGRES_PASSWORD: stratum
          POSTGRES_DB: stratum_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    env:
      DATABASE_URL: postgresql://stratum:stratum@localhost:5432/stratum_test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      # Build publishable packages only (skip demo which has Vite dep issues in CI)
      - name: Build packages
        run: |
          npx turbo build --filter=@stratum-hq/core --filter=@stratum-hq/lib --filter=@stratum-hq/sdk --filter=@stratum-hq/db-adapters --filter=@stratum-hq/cli --filter=@stratum-hq/control-plane --filter=@stratum-hq/react

      # Run tests (passWithNoTests handles packages without test files)
      - name: Test
        run: |
          npx turbo test --filter=@stratum-hq/core --filter=@stratum-hq/lib --filter=@stratum-hq/sdk --filter=@stratum-hq/db-adapters --filter=@stratum-hq/cli --filter=@stratum-hq/react
